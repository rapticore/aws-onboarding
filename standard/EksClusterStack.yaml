AWSTemplateFormatVersion: "2010-09-09"
Description: EKS Cluster stack for Rapticore tenant deployment

Parameters:
  ClusterName:
    Type: String
    Default: rapticore-eks
    Description: Name of the EKS cluster

  KubernetesVersion:
    Type: String
    Default: "1.35"
    Description: Kubernetes version for the EKS cluster
    AllowedValues:
      - "1.32"
      - "1.33"
      - "1.34"
      - "1.35"

  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC ID for the EKS cluster

  SubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Description: List of subnet IDs for the EKS cluster (at least 2 in different AZs)

  EndpointPublicAccess:
    Type: String
    Default: "true"
    AllowedValues:
      - "true"
      - "false"
    Description: Enable public API endpoint access

  EndpointPrivateAccess:
    Type: String
    Default: "true"
    AllowedValues:
      - "true"
      - "false"
    Description: Enable private API endpoint access

Resources:
  #####
  # IAM Roles
  #####
  EksClusterRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${ClusterName}-cluster-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: eks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonEKSClusterPolicy
        - arn:aws:iam::aws:policy/AmazonEKSVPCResourceController
      Tags:
        - Key: Name
          Value: !Sub "${ClusterName}-cluster-role"

  EksNodeRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${ClusterName}-node-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonEKSWorkerNodePolicy
        - arn:aws:iam::aws:policy/AmazonEC2ContainerRegistryReadOnly
        - arn:aws:iam::aws:policy/AmazonEKS_CNI_Policy
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      Policies:
        - PolicyName: EksNodeSqsPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - sqs:ChangeMessageVisibility
                  - sqs:DeleteMessage
                  - sqs:GetQueueAttributes
                  - sqs:GetQueueUrl
                  - sqs:ListQueues
                  - sqs:ListDeadLetterSourceQueues
                  - sqs:ListQueueTags
                  - sqs:ReceiveMessage
                  - sqs:SendMessage
                Resource:
                  - !Sub "arn:aws:sqs:${AWS::Region}:${AWS::AccountId}:rapticore-*"
                  - !Sub "arn:aws:sqs:${AWS::Region}:${AWS::AccountId}:real-time-threat-alert-trigger-*"
                  - !Sub "arn:aws:sqs:${AWS::Region}:${AWS::AccountId}:vcs-trigger-*"
        - PolicyName: EksNodeS3Policy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:DeleteObject
                  - s3:ListBucket
                Resource:
                  - "arn:aws:s3:::vcs-content-*"
                  - "arn:aws:s3:::vcs-content-*/*"
                  - "arn:aws:s3:::ore.c7n.remediation.policies"
                  - "arn:aws:s3:::ore.c7n.remediation.policies/*"
                  - "arn:aws:s3:::vcs-centralized-data"
                  - "arn:aws:s3:::vcs-centralized-data/*"
        - PolicyName: EksNodeBedrockPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - bedrock:InvokeModel
                Resource:
                  - "arn:aws:bedrock:*:*:foundation-model/*nova-lite*"
                  - "arn:aws:bedrock:*:*:inference-profile/*nova-lite*"
                  - "arn:aws:bedrock:*:*:foundation-model/*haiku*"
                  - "arn:aws:bedrock:*:*:inference-profile/*haiku*"
        - PolicyName: EksNodeAssumeRolePolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - sts:AssumeRole
                  - sts:TagSession
                Resource: "arn:aws:iam::*:role/rapticore*"
        - PolicyName: EksNodeSesPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - ses:SendEmail
                  - ses:SendRawEmail
                Resource: "*"
      Tags:
        - Key: Name
          Value: !Sub "${ClusterName}-node-role"

  #####
  # Instance Profile for EKS Nodes
  #####
  EksNodeInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      InstanceProfileName: !Sub "${ClusterName}-node-instance-profile"
      Roles:
        - !Ref EksNodeRole

  #####
  # Security Groups
  #####
  ClusterSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for EKS cluster
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
          Description: Allow HTTPS traffic
      Tags:
        - Key: Name
          Value: !Sub "${ClusterName}-cluster-sg"

  ClusterSecurityGroupIngress:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !Ref ClusterSecurityGroup
      IpProtocol: "-1"
      SourceSecurityGroupId: !Ref ClusterSecurityGroup
      Description: Allow cluster internal communication

  #####
  # EKS Cluster
  #####
  EksCluster:
    Type: AWS::EKS::Cluster
    Properties:
      Name: !Ref ClusterName
      Version: !Ref KubernetesVersion
      RoleArn: !GetAtt EksClusterRole.Arn
      ResourcesVpcConfig:
        SecurityGroupIds:
          - !Ref ClusterSecurityGroup
        SubnetIds: !Ref SubnetIds
        EndpointPublicAccess: !Ref EndpointPublicAccess
        EndpointPrivateAccess: !Ref EndpointPrivateAccess
      Logging:
        ClusterLogging:
          EnabledTypes:
            - Type: api
            - Type: audit
            - Type: authenticator
            - Type: scheduler
      Tags:
        - Key: Name
          Value: !Ref ClusterName

  #####
  # EKS Add-ons
  #####
  VpcCniAddon:
    Type: AWS::EKS::Addon
    DependsOn: EksCluster
    Properties:
      AddonName: vpc-cni
      ClusterName: !Ref ClusterName
      ResolveConflicts: OVERWRITE
      ConfigurationValues: '{"enableNetworkPolicy":"true","env":{"ENABLE_PREFIX_DELEGATION":"true","WARM_PREFIX_TARGET":"1","MINIMUM_IP_TARGET":"50","WARM_IP_TARGET":"10"}}'

  CoreDnsAddon:
    Type: AWS::EKS::Addon
    DependsOn: EksCluster
    Properties:
      AddonName: coredns
      ClusterName: !Ref ClusterName
      ResolveConflicts: OVERWRITE

  KubeProxyAddon:
    Type: AWS::EKS::Addon
    DependsOn: EksCluster
    Properties:
      AddonName: kube-proxy
      ClusterName: !Ref ClusterName
      ResolveConflicts: OVERWRITE

  EbsCsiAddon:
    Type: AWS::EKS::Addon
    DependsOn: EksCluster
    Properties:
      AddonName: aws-ebs-csi-driver
      ClusterName: !Ref ClusterName
      ResolveConflicts: OVERWRITE
      ServiceAccountRoleArn: !GetAtt EbsCsiDriverRole.Arn

  PodIdentityAgentAddon:
    Type: AWS::EKS::Addon
    DependsOn: EksCluster
    Properties:
      AddonName: eks-pod-identity-agent
      ClusterName: !Ref ClusterName
      ResolveConflicts: OVERWRITE

  #####
  # OIDC Provider for IRSA
  #####
  OidcProvider:
    Type: AWS::IAM::OIDCProvider
    DependsOn: EksCluster
    Properties:
      Url: !GetAtt EksCluster.OpenIdConnectIssuerUrl
      ClientIdList:
        - sts.amazonaws.com
      ThumbprintList:
        # AWS manages the thumbprint for EKS OIDC providers automatically
        # Using a placeholder - AWS will update this when the OIDC provider is created
        - "9e99a48a9960b14926bb7f3b02e22da2b0ab7280"

  #####
  # EBS CSI Driver IAM Role (IRSA)
  #####
  EbsCsiDriverRole:
    Type: AWS::IAM::Role
    DependsOn: OidcProvider
    Properties:
      RoleName: !Sub "${ClusterName}-ebs-csi-driver-role"
      AssumeRolePolicyDocument:
        Fn::Sub:
          - |
            {
              "Version": "2012-10-17",
              "Statement": [{
                "Effect": "Allow",
                "Principal": {
                  "Federated": "arn:aws:iam::${AWS::AccountId}:oidc-provider/${OidcUrl}"
                },
                "Action": "sts:AssumeRoleWithWebIdentity",
                "Condition": {
                  "StringEquals": {
                    "${OidcUrl}:aud": "sts.amazonaws.com",
                    "${OidcUrl}:sub": "system:serviceaccount:kube-system:ebs-csi-controller-sa"
                  }
                }
              }]
            }
          - OidcUrl: !Select [1, !Split ["https://", !GetAtt EksCluster.OpenIdConnectIssuerUrl]]
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonEBSCSIDriverPolicy

  #####
  # Application Pods IAM Role (EKS Pod Identity)
  # Allows pods in tenant namespaces to access AWS services
  #####
  ApplicationPodsRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${ClusterName}-application-pods-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: pods.eks.amazonaws.com
            Action:
              - "sts:AssumeRole"
              - "sts:TagSession"
      Policies:
        - PolicyName: ApplicationPodsPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              # SQS Access
              - Effect: Allow
                Action:
                  - sqs:SendMessage
                  - sqs:ReceiveMessage
                  - sqs:DeleteMessage
                  - sqs:GetQueueAttributes
                  - sqs:GetQueueUrl
                  - sqs:ChangeMessageVisibility
                  - sqs:ListQueues
                  - sqs:ListDeadLetterSourceQueues
                  - sqs:ListQueueTags
                Resource:
                  - !Sub "arn:aws:sqs:${AWS::Region}:${AWS::AccountId}:rapticore-*"
                  - !Sub "arn:aws:sqs:${AWS::Region}:${AWS::AccountId}:real-time-threat-alert-trigger-*"
                  - !Sub "arn:aws:sqs:${AWS::Region}:${AWS::AccountId}:vcs-trigger-*"
              # S3 Access
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:DeleteObject
                  - s3:ListBucket
                Resource:
                  - "arn:aws:s3:::vcs-content-*"
                  - "arn:aws:s3:::vcs-content-*/*"
                  - "arn:aws:s3:::vcs-centralized-data"
                  - "arn:aws:s3:::vcs-centralized-data/*"
                  - "arn:aws:s3:::ore.c7n.remediation.policies"
                  - "arn:aws:s3:::ore.c7n.remediation.policies/*"
                  - "arn:aws:s3:::rapticore-standard-tenants-postgres-db-backups"
                  - "arn:aws:s3:::rapticore-standard-tenants-postgres-db-backups/*"
              # Bedrock Access
              - Effect: Allow
                Action:
                  - bedrock:InvokeModel
                Resource:
                  - "arn:aws:bedrock:*:*:foundation-model/*nova-lite*"
                  - "arn:aws:bedrock:*:*:inference-profile/*nova-lite*"
                  - "arn:aws:bedrock:*:*:foundation-model/*haiku*"
                  - "arn:aws:bedrock:*:*:inference-profile/*haiku*"
              # SES Access
              - Effect: Allow
                Action:
                  - ses:SendEmail
                  - ses:SendRawEmail
                Resource: "*"
              # Cross-account STS AssumeRole (for cloud account scanning)
              - Effect: Allow
                Action:
                  - sts:AssumeRole
                  - sts:TagSession
                Resource: "arn:aws:iam::*:role/rapticore-cross-account-*"
              # IAM and EC2 Read-Only (needed by discovery for role enumeration)
              - Effect: Allow
                Action:
                  - iam:ListRole*
                  - iam:GetRole*
                  - ec2:DescribeRegions
                Resource: "*"
              # Cognito Identity (needed for Azure workload identity)
              - Effect: Allow
                Action:
                  - cognito-identity:GetOpenIdTokenForDeveloperIdentity
                Resource: !Sub "arn:aws:cognito-identity:${AWS::Region}:${AWS::AccountId}:identitypool/*"

  #####
  # AWS Load Balancer Controller IAM Role (IRSA)
  #####
  AwsLoadBalancerControllerRole:
    Type: AWS::IAM::Role
    DependsOn: OidcProvider
    Properties:
      RoleName: !Sub "${ClusterName}-aws-load-balancer-controller-role"
      AssumeRolePolicyDocument:
        Fn::Sub:
          - |
            {
              "Version": "2012-10-17",
              "Statement": [{
                "Effect": "Allow",
                "Principal": {
                  "Federated": "arn:aws:iam::${AWS::AccountId}:oidc-provider/${OidcUrl}"
                },
                "Action": "sts:AssumeRoleWithWebIdentity",
                "Condition": {
                  "StringEquals": {
                    "${OidcUrl}:aud": "sts.amazonaws.com",
                    "${OidcUrl}:sub": "system:serviceaccount:kube-system:aws-load-balancer-controller"
                  }
                }
              }]
            }
          - OidcUrl: !Select [1, !Split ["https://", !GetAtt EksCluster.OpenIdConnectIssuerUrl]]
      Policies:
        - PolicyName: AWSLoadBalancerControllerPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - iam:CreateServiceLinkedRole
                Resource: "*"
                Condition:
                  StringEquals:
                    iam:AWSServiceName: elasticloadbalancing.amazonaws.com
              - Effect: Allow
                Action:
                  - ec2:DescribeAccountAttributes
                  - ec2:DescribeAddresses
                  - ec2:DescribeAvailabilityZones
                  - ec2:DescribeInternetGateways
                  - ec2:DescribeVpcs
                  - ec2:DescribeVpcPeeringConnections
                  - ec2:DescribeSubnets
                  - ec2:DescribeSecurityGroups
                  - ec2:DescribeInstances
                  - ec2:DescribeNetworkInterfaces
                  - ec2:DescribeTags
                  - ec2:DescribeRouteTables
                  - ec2:GetCoipPoolUsage
                  - ec2:DescribeCoipPools
                  - elasticloadbalancing:DescribeLoadBalancers
                  - elasticloadbalancing:DescribeLoadBalancerAttributes
                  - elasticloadbalancing:DescribeListeners
                  - elasticloadbalancing:DescribeListenerAttributes
                  - elasticloadbalancing:DescribeListenerCertificates
                  - elasticloadbalancing:DescribeSSLPolicies
                  - elasticloadbalancing:DescribeRules
                  - elasticloadbalancing:DescribeTargetGroups
                  - elasticloadbalancing:DescribeTargetGroupAttributes
                  - elasticloadbalancing:DescribeTargetHealth
                  - elasticloadbalancing:DescribeTags
                Resource: "*"
              - Effect: Allow
                Action:
                  - cognito-idp:DescribeUserPoolClient
                  - acm:ListCertificates
                  - acm:DescribeCertificate
                  - iam:ListServerCertificates
                  - iam:GetServerCertificate
                  - waf-regional:GetWebACL
                  - waf-regional:GetWebACLForResource
                  - waf-regional:AssociateWebACL
                  - waf-regional:DisassociateWebACL
                  - wafv2:GetWebACL
                  - wafv2:GetWebACLForResource
                  - wafv2:AssociateWebACL
                  - wafv2:DisassociateWebACL
                  - shield:GetSubscriptionState
                  - shield:DescribeProtection
                  - shield:CreateProtection
                  - shield:DeleteProtection
                Resource: "*"
              - Effect: Allow
                Action:
                  - ec2:AuthorizeSecurityGroupIngress
                  - ec2:RevokeSecurityGroupIngress
                Resource: "*"
              - Effect: Allow
                Action:
                  - ec2:CreateSecurityGroup
                Resource: "*"
              - Effect: Allow
                Action:
                  - ec2:CreateTags
                Resource: "arn:aws:ec2:*:*:security-group/*"
                Condition:
                  StringEquals:
                    ec2:CreateAction: CreateSecurityGroup
                  "Null":
                    aws:RequestTag/elbv2.k8s.aws/cluster: "false"
              - Effect: Allow
                Action:
                  - ec2:CreateTags
                  - ec2:DeleteTags
                Resource: "arn:aws:ec2:*:*:security-group/*"
                Condition:
                  "Null":
                    aws:RequestTag/elbv2.k8s.aws/cluster: "true"
                    aws:ResourceTag/elbv2.k8s.aws/cluster: "false"
              - Effect: Allow
                Action:
                  - ec2:AuthorizeSecurityGroupIngress
                  - ec2:RevokeSecurityGroupIngress
                  - ec2:DeleteSecurityGroup
                Resource: "*"
                Condition:
                  "Null":
                    aws:ResourceTag/elbv2.k8s.aws/cluster: "false"
              - Effect: Allow
                Action:
                  - elasticloadbalancing:CreateLoadBalancer
                  - elasticloadbalancing:CreateTargetGroup
                Resource: "*"
                Condition:
                  "Null":
                    aws:RequestTag/elbv2.k8s.aws/cluster: "false"
              - Effect: Allow
                Action:
                  - elasticloadbalancing:CreateListener
                  - elasticloadbalancing:DeleteListener
                  - elasticloadbalancing:CreateRule
                  - elasticloadbalancing:DeleteRule
                Resource: "*"
              - Effect: Allow
                Action:
                  - elasticloadbalancing:AddTags
                  - elasticloadbalancing:RemoveTags
                Resource:
                  - "arn:aws:elasticloadbalancing:*:*:targetgroup/*/*"
                  - "arn:aws:elasticloadbalancing:*:*:loadbalancer/net/*/*"
                  - "arn:aws:elasticloadbalancing:*:*:loadbalancer/app/*/*"
                Condition:
                  "Null":
                    aws:RequestTag/elbv2.k8s.aws/cluster: "true"
                    aws:ResourceTag/elbv2.k8s.aws/cluster: "false"
              - Effect: Allow
                Action:
                  - elasticloadbalancing:AddTags
                  - elasticloadbalancing:RemoveTags
                Resource:
                  - "arn:aws:elasticloadbalancing:*:*:listener/net/*/*/*"
                  - "arn:aws:elasticloadbalancing:*:*:listener/app/*/*/*"
                  - "arn:aws:elasticloadbalancing:*:*:listener-rule/net/*/*/*"
                  - "arn:aws:elasticloadbalancing:*:*:listener-rule/app/*/*/*"
              - Effect: Allow
                Action:
                  - elasticloadbalancing:ModifyLoadBalancerAttributes
                  - elasticloadbalancing:SetIpAddressType
                  - elasticloadbalancing:SetSecurityGroups
                  - elasticloadbalancing:SetSubnets
                  - elasticloadbalancing:DeleteLoadBalancer
                  - elasticloadbalancing:ModifyTargetGroup
                  - elasticloadbalancing:ModifyTargetGroupAttributes
                  - elasticloadbalancing:DeleteTargetGroup
                Resource: "*"
                Condition:
                  "Null":
                    aws:ResourceTag/elbv2.k8s.aws/cluster: "false"
              - Effect: Allow
                Action:
                  - elasticloadbalancing:AddTags
                Resource:
                  - "arn:aws:elasticloadbalancing:*:*:targetgroup/*/*"
                  - "arn:aws:elasticloadbalancing:*:*:loadbalancer/net/*/*"
                  - "arn:aws:elasticloadbalancing:*:*:loadbalancer/app/*/*"
                Condition:
                  StringEquals:
                    elasticloadbalancing:CreateAction:
                      - CreateTargetGroup
                      - CreateLoadBalancer
                  "Null":
                    aws:RequestTag/elbv2.k8s.aws/cluster: "false"
              - Effect: Allow
                Action:
                  - elasticloadbalancing:RegisterTargets
                  - elasticloadbalancing:DeregisterTargets
                Resource: "arn:aws:elasticloadbalancing:*:*:targetgroup/*/*"
              - Effect: Allow
                Action:
                  - elasticloadbalancing:SetWebAcl
                  - elasticloadbalancing:ModifyListener
                  - elasticloadbalancing:AddListenerCertificates
                  - elasticloadbalancing:RemoveListenerCertificates
                  - elasticloadbalancing:ModifyRule
                Resource: "*"

  #####
  # External DNS IAM Role (IRSA)
  # Allows external-dns to manage Route53 records
  #####
  ExternalDnsRole:
    Type: AWS::IAM::Role
    DependsOn: OidcProvider
    Properties:
      RoleName: !Sub "${ClusterName}-external-dns-role"
      AssumeRolePolicyDocument:
        Fn::Sub:
          - |
            {
              "Version": "2012-10-17",
              "Statement": [{
                "Effect": "Allow",
                "Principal": {
                  "Federated": "arn:aws:iam::${AWS::AccountId}:oidc-provider/${OidcUrl}"
                },
                "Action": "sts:AssumeRoleWithWebIdentity",
                "Condition": {
                  "StringEquals": {
                    "${OidcUrl}:aud": "sts.amazonaws.com",
                    "${OidcUrl}:sub": "system:serviceaccount:kube-system:external-dns"
                  }
                }
              }]
            }
          - OidcUrl: !Select [1, !Split ["https://", !GetAtt EksCluster.OpenIdConnectIssuerUrl]]
      Policies:
        - PolicyName: ExternalDnsPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - route53:ChangeResourceRecordSets
                Resource: "arn:aws:route53:::hostedzone/*"
              - Effect: Allow
                Action:
                  - route53:ListHostedZones
                  - route53:ListResourceRecordSets
                  - route53:ListTagsForResource
                Resource: "*"

  #####
  # Fluent Bit IAM Role (IRSA)
  # Allows Fluent Bit to ship container logs to CloudWatch Logs
  #####
  FluentBitRole:
    Type: AWS::IAM::Role
    DependsOn: OidcProvider
    Properties:
      RoleName: !Sub "${ClusterName}-fluent-bit-role"
      AssumeRolePolicyDocument:
        Fn::Sub:
          - |
            {
              "Version": "2012-10-17",
              "Statement": [{
                "Effect": "Allow",
                "Principal": {
                  "Federated": "arn:aws:iam::${AWS::AccountId}:oidc-provider/${OidcUrl}"
                },
                "Action": "sts:AssumeRoleWithWebIdentity",
                "Condition": {
                  "StringEquals": {
                    "${OidcUrl}:aud": "sts.amazonaws.com",
                    "${OidcUrl}:sub": "system:serviceaccount:amazon-cloudwatch:aws-for-fluent-bit"
                  }
                }
              }]
            }
          - OidcUrl: !Select [1, !Split ["https://", !GetAtt EksCluster.OpenIdConnectIssuerUrl]]
      Policies:
        - PolicyName: FluentBitCloudWatchPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                  - logs:DescribeLogStreams
                  - logs:DescribeLogGroups
                  - logs:PutRetentionPolicy
                Resource: !Sub "arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/eks/${ClusterName}/*"

  #####
  # Cluster Autoscaler IAM Role (IRSA)
  # Allows the Cluster Autoscaler to discover and scale ASGs.
  # Uses tag-based conditions so it can only scale ASGs owned by this cluster.
  #####
  ClusterAutoscalerRole:
    Type: AWS::IAM::Role
    DependsOn: OidcProvider
    Properties:
      RoleName: !Sub "${ClusterName}-cluster-autoscaler"
      AssumeRolePolicyDocument:
        Fn::Sub:
          - |
            {
              "Version": "2012-10-17",
              "Statement": [{
                "Effect": "Allow",
                "Principal": {
                  "Federated": "arn:aws:iam::${AWS::AccountId}:oidc-provider/${OidcUrl}"
                },
                "Action": "sts:AssumeRoleWithWebIdentity",
                "Condition": {
                  "StringEquals": {
                    "${OidcUrl}:aud": "sts.amazonaws.com",
                    "${OidcUrl}:sub": "system:serviceaccount:kube-system:cluster-autoscaler"
                  }
                }
              }]
            }
          - OidcUrl: !Select [1, !Split ["https://", !GetAtt EksCluster.OpenIdConnectIssuerUrl]]
      Policies:
        - PolicyName: ClusterAutoscalerPolicy
          PolicyDocument:
            Fn::Sub: |
              {
                "Version": "2012-10-17",
                "Statement": [
                  {
                    "Sid": "ClusterAutoscalerDescribe",
                    "Effect": "Allow",
                    "Action": [
                      "autoscaling:DescribeAutoScalingGroups",
                      "autoscaling:DescribeAutoScalingInstances",
                      "autoscaling:DescribeLaunchConfigurations",
                      "autoscaling:DescribeScalingActivities",
                      "autoscaling:DescribeTags",
                      "ec2:DescribeImages",
                      "ec2:DescribeInstanceTypes",
                      "ec2:DescribeLaunchTemplateVersions",
                      "ec2:GetInstanceTypesFromInstanceRequirements",
                      "eks:DescribeNodegroup"
                    ],
                    "Resource": "*"
                  },
                  {
                    "Sid": "ClusterAutoscalerScale",
                    "Effect": "Allow",
                    "Action": [
                      "autoscaling:SetDesiredCapacity",
                      "autoscaling:TerminateInstanceInAutoScalingGroup"
                    ],
                    "Resource": "*",
                    "Condition": {
                      "StringEquals": {
                        "aws:ResourceTag/k8s.io/cluster-autoscaler/${ClusterName}": "owned"
                      }
                    }
                  }
                ]
              }

  #####
  # Observability — S3 bucket for Loki log chunks.
  # Per-cluster bucket (named by ClusterName) keeps dev/prod logs fully isolated.
  # 90-day lifecycle expiration caps storage cost; per-tenant retention inside
  # Loki (via runtime overrides) governs how long logs are queryable.
  #####
  LokiLogsBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !Sub "rapticore-loki-${ClusterName}"
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      VersioningConfiguration:
        Status: Suspended
      LifecycleConfiguration:
        Rules:
          - Id: ExpireLokiChunksAfter90Days
            Status: Enabled
            ExpirationInDays: 90
            NoncurrentVersionExpirationInDays: 7
          - Id: AbortIncompleteMultipartUpload
            Status: Enabled
            AbortIncompleteMultipartUpload:
              DaysAfterInitiation: 7

  LokiLogsBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref LokiLogsBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: DenyInsecureTransport
            Effect: Deny
            Principal: "*"
            Action: "s3:*"
            Resource:
              - !GetAtt LokiLogsBucket.Arn
              - !Sub "${LokiLogsBucket.Arn}/*"
            Condition:
              Bool:
                "aws:SecureTransport": false

  #####
  # Observability — Loki IAM role (EKS Pod Identity).
  # Bound to the `loki` ServiceAccount in the `observability` namespace on this
  # cluster via PodIdentityAssociation (declarative, below). Least-privilege
  # S3 access scoped to the per-cluster bucket only.
  #####
  LokiRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${ClusterName}-loki-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: pods.eks.amazonaws.com
            Action:
              - "sts:AssumeRole"
              - "sts:TagSession"
      Policies:
        - PolicyName: LokiS3Access
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: LokiBucketObjectAccess
                Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:DeleteObject
                  - s3:AbortMultipartUpload
                  - s3:ListMultipartUploadParts
                Resource: !Sub "${LokiLogsBucket.Arn}/*"
              - Sid: LokiBucketList
                Effect: Allow
                Action:
                  - s3:ListBucket
                  - s3:GetBucketLocation
                  - s3:ListBucketMultipartUploads
                Resource: !GetAtt LokiLogsBucket.Arn

  LokiPodIdentityAssociation:
    Type: AWS::EKS::PodIdentityAssociation
    Properties:
      ClusterName: !Ref ClusterName
      Namespace: observability
      ServiceAccount: loki
      RoleArn: !GetAtt LokiRole.Arn

  #####
  # cert-manager IAM Role (IRSA)
  # Allows cert-manager to manage Route53 TXT records for DNS-01 ACME challenges
  # (Let's Encrypt certificate issuance + renewal)
  #####
  CertManagerRole:
    Type: AWS::IAM::Role
    DependsOn: OidcProvider
    Properties:
      RoleName: !Sub "${ClusterName}-cert-manager-role"
      AssumeRolePolicyDocument:
        Fn::Sub:
          - |
            {
              "Version": "2012-10-17",
              "Statement": [{
                "Effect": "Allow",
                "Principal": {
                  "Federated": "arn:aws:iam::${AWS::AccountId}:oidc-provider/${OidcUrl}"
                },
                "Action": "sts:AssumeRoleWithWebIdentity",
                "Condition": {
                  "StringEquals": {
                    "${OidcUrl}:aud": "sts.amazonaws.com",
                    "${OidcUrl}:sub": "system:serviceaccount:cert-manager:cert-manager"
                  }
                }
              }]
            }
          - OidcUrl: !Select [1, !Split ["https://", !GetAtt EksCluster.OpenIdConnectIssuerUrl]]
      Policies:
        - PolicyName: CertManagerRoute53Policy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - route53:GetChange
                Resource: "arn:aws:route53:::change/*"
              - Effect: Allow
                Action:
                  - route53:ChangeResourceRecordSets
                  - route53:ListResourceRecordSets
                Resource: "arn:aws:route53:::hostedzone/*"
              - Effect: Allow
                Action:
                  - route53:ListHostedZonesByName
                  - route53:ListHostedZones
                Resource: "*"
      Tags:
        - Key: ManagedBy
          Value: EksClusterStack

Outputs:
  ClusterName:
    Description: Name of the EKS cluster
    Value: !Ref ClusterName
    Export:
      Name: !Sub "${AWS::StackName}-ClusterName"

  ClusterArn:
    Description: ARN of the EKS cluster
    Value: !GetAtt EksCluster.Arn
    Export:
      Name: !Sub "${AWS::StackName}-ClusterArn"

  ClusterEndpoint:
    Description: Endpoint URL for the EKS cluster API server
    Value: !GetAtt EksCluster.Endpoint
    Export:
      Name: !Sub "${AWS::StackName}-ClusterEndpoint"

  ClusterSecurityGroupId:
    Description: Security group ID for the EKS cluster
    Value: !Ref ClusterSecurityGroup
    Export:
      Name: !Sub "${AWS::StackName}-ClusterSecurityGroupId"

  NodeRoleArn:
    Description: ARN of the IAM role for EKS nodes
    Value: !GetAtt EksNodeRole.Arn
    Export:
      Name: !Sub "${AWS::StackName}-NodeRoleArn"

  NodeInstanceProfileArn:
    Description: ARN of the IAM instance profile for EKS nodes
    Value: !GetAtt EksNodeInstanceProfile.Arn
    Export:
      Name: !Sub "${AWS::StackName}-NodeInstanceProfileArn"

  OidcProviderArn:
    Description: ARN of the OIDC provider for IRSA
    Value: !GetAtt OidcProvider.Arn
    Export:
      Name: !Sub "${AWS::StackName}-OidcProviderArn"

  OidcProviderUrl:
    Description: URL of the OIDC provider (without https://)
    Value: !Select [1, !Split ["https://", !GetAtt EksCluster.OpenIdConnectIssuerUrl]]
    Export:
      Name: !Sub "${AWS::StackName}-OidcProviderUrl"

  AwsLoadBalancerControllerRoleArn:
    Description: ARN of the IAM role for AWS Load Balancer Controller
    Value: !GetAtt AwsLoadBalancerControllerRole.Arn
    Export:
      Name: !Sub "${AWS::StackName}-AwsLoadBalancerControllerRoleArn"

  ExternalDnsRoleArn:
    Description: ARN of the IAM role for external-dns
    Value: !GetAtt ExternalDnsRole.Arn
    Export:
      Name: !Sub "${AWS::StackName}-ExternalDnsRoleArn"

  CertManagerRoleArn:
    Description: IAM role ARN for cert-manager (Route53 DNS-01 challenges)
    Value: !GetAtt CertManagerRole.Arn
    Export:
      Name: !Sub "${AWS::StackName}-CertManagerRoleArn"

  ApplicationPodsRoleArn:
    Description: ARN of the IAM role for application pods
    Value: !GetAtt ApplicationPodsRole.Arn
    Export:
      Name: !Sub "${ClusterName}-ApplicationPodsRoleArn"

  FluentBitRoleArn:
    Description: ARN of the IAM role for Fluent Bit (CloudWatch Logs)
    Value: !GetAtt FluentBitRole.Arn
    Export:
      Name: !Sub "${AWS::StackName}-FluentBitRoleArn"

  ClusterAutoscalerRoleArn:
    Description: ARN of the IAM role for Cluster Autoscaler
    Value: !GetAtt ClusterAutoscalerRole.Arn
    Export:
      Name: !Sub "${AWS::StackName}-ClusterAutoscalerRoleArn"

  VpcId:
    Description: VPC ID where the cluster is deployed
    Value: !Ref VpcId
    Export:
      Name: !Sub "${AWS::StackName}-VpcId"

  SubnetIds:
    Description: Subnet IDs where the cluster is deployed
    Value: !Join [",", !Ref SubnetIds]
    Export:
      Name: !Sub "${AWS::StackName}-SubnetIds"

  LokiBucketName:
    Description: Name of the S3 bucket used as Loki chunk storage backend
    Value: !Ref LokiLogsBucket
    Export:
      Name: !Sub "${AWS::StackName}-LokiBucketName"

  LokiRoleArn:
    Description: ARN of the IAM role bound to Loki's ServiceAccount via Pod Identity
    Value: !GetAtt LokiRole.Arn
    Export:
      Name: !Sub "${AWS::StackName}-LokiRoleArn"
